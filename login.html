<!doctype html>

<html>

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Login

</title>

<link rel="stylesheet"
href="./styles.css">

</head>

<body>

<section
class="workspace">

<h1>

Sign in

</h1>

<form id="loginForm">

<div class="form-row">

<label>Email</label>

<input
id="email"
type="email"
required>

</div>


<div class="form-row">

<label>Password</label>

<input
id="password"
type="password"
required>

</div>


<button
class="primary-button"
type="submit">

Continue

</button>

</form>

</section>

<script src="./app.js"></script>

</body>

</html>
